<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Local Game Server — Client</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: system-ui, sans-serif; background: #111; color: #ccc; padding: 24px; }
  .container { max-width: 800px; margin: 0 auto; }
  h1 { color: #c9a84c; margin-bottom: 4px; }
  .subtitle { color: #666; font-size: 0.85rem; margin-bottom: 20px; }
  .card { background: #1a1a1a; border: 1px solid #333; border-radius: 6px; padding: 16px; margin-bottom: 16px; }
  .card h3 { color: #c9a84c; margin-bottom: 12px; font-size: 0.95rem; }
  label { display: block; color: #999; font-size: 0.82rem; margin-bottom: 4px; }
  input, textarea { width: 100%; background: #222; border: 1px solid #444; color: #eee; padding: 8px 10px; border-radius: 4px; font-size: 0.9rem; margin-bottom: 10px; }
  button { background: #2a2a2a; color: #c9a84c; border: 1px solid #444; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-size: 0.85rem; }
  button:hover { background: #333; }
  button.primary { background: #4a6fa5; color: #fff; border-color: #5a7fb5; }
  button.primary:hover { background: #5a7fb5; }
  button.danger { background: #6a3030; color: #e88; border-color: #8a4040; }
  .status { display: flex; gap: 8px; align-items: center; margin-bottom: 16px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; background: #555; }
  .dot.connected { background: #2ecc71; }
  .dot.disconnected { background: #e74c3c; }
  .dot.connecting { background: #f39c12; }
  .presence { display: flex; flex-wrap: wrap; gap: 8px; }
  .user-badge { background: #222; border: 1px solid #444; border-radius: 20px; padding: 4px 12px; font-size: 0.82rem; }
  .user-badge.dm { border-color: #c9a84c; }
  .record { background: #222; border: 1px solid #333; border-radius: 4px; padding: 10px; margin-bottom: 8px; }
  .record .meta { font-size: 0.75rem; color: #666; margin-top: 4px; }
  .token-input { font-family: monospace; font-size: 0.75rem; word-break: break-all; }
  #log { max-height: 200px; overflow-y: auto; background: #0a0a0a; border: 1px solid #222; border-radius: 4px; padding: 8px; font-family: monospace; font-size: 0.72rem; }
  #log div { padding: 2px 0; border-bottom: 1px solid #111; }
</style>
</head>
<body>
<div class="container">
  <h1>🎲 Local Game Server</h1>
  <p class="subtitle">Stage 1 Foundation — minimal test client</p>

  <div class="status">
    <span class="dot disconnected" id="statusDot"></span>
    <span id="statusText">Disconnected</span>
  </div>

  <div class="card">
    <h3>🔑 Connect</h3>
    <label>Server URL</label>
    <input id="serverUrl" value="ws://localhost:3001" />
    <label>VTT Token (paste from hunt-website profile)</label>
    <input id="tokenInput" class="token-input" placeholder="eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCJ9..." />
    <button class="primary" id="connectBtn">Connect</button>
    <button class="danger" id="disconnectBtn" style="display:none">Disconnect</button>
  </div>

  <div class="card">
    <h3>👥 Connected Users</h3>
    <div class="presence" id="presenceList">
      <span style="color:#666;font-size:0.82rem">Not connected</span>
    </div>
  </div>

  <div class="card">
    <h3>📝 Records</h3>
    <label>New Record Content</label>
    <textarea id="recordContent" rows="3" placeholder='{ "title": "My Note", "body": "Hello world!" }'></textarea>
    <button id="createRecordBtn">Create Record</button>
    <div id="recordList" style="margin-top:12px"></div>
  </div>

  <div class="card">
    <h3>📋 Event Log</h3>
    <div id="log"></div>
  </div>
</div>

<script>
const statusDot = document.getElementById('statusDot')
const statusText = document.getElementById('statusText')
const serverUrl = document.getElementById('serverUrl')
const tokenInput = document.getElementById('tokenInput')
const connectBtn = document.getElementById('connectBtn')
const disconnectBtn = document.getElementById('disconnectBtn')
const presenceList = document.getElementById('presenceList')
const recordContent = document.getElementById('recordContent')
const createRecordBtn = document.getElementById('createRecordBtn')
const recordList = document.getElementById('recordList')
const logEl = document.getElementById('log')

let ws = null
let identity = null

function setStatus(state) {
  statusDot.className = 'dot ' + state
  statusText.textContent = state === 'connected' ? 'Connected' : state === 'connecting' ? 'Connecting...' : 'Disconnected'
}

function log(msg, type = 'info') {
  const div = document.createElement('div')
  div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`
  div.style.color = type === 'error' ? '#e74c3c' : type === 'success' ? '#2ecc71' : '#999'
  logEl.appendChild(div)
  logEl.scrollTop = logEl.scrollHeight
}

function connect() {
  const url = serverUrl.value.trim()
  const token = tokenInput.value.trim()
  if (!token) { alert('Enter your VTT token first'); return }

  setStatus('connecting')
  ws = new WebSocket(url + '?token=' + encodeURIComponent(token))

  ws.onopen = () => {
    setStatus('connected')
    connectBtn.style.display = 'none'
    disconnectBtn.style.display = 'inline-block'
    tokenInput.disabled = true
    log('Connected to server', 'success')
  }

  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data)
    switch (msg.type) {
      case 'init':
        identity = msg.identity
        renderRecords(msg.records || [])
        renderPresence(msg.users || [])
        log(`Initialized as ${msg.identity.username} (${msg.identity.role})`)
        break
      case 'presence':
        renderPresence(msg.users)
        break
      case 'record-created':
        log(`Record created by ${msg.by}: ${JSON.stringify(msg.record).slice(0, 60)}...`)
        if (!msg.by === identity?.username) fetchRecords()
        break
      case 'record-updated':
        log(`Record updated by ${msg.by}`)
        fetchRecords()
        break
      case 'record-deleted':
        log(`Record deleted by ${msg.by}`)
        fetchRecords()
        break
      case 'record-created-ack':
        log('Record created successfully', 'success')
        fetchRecords()
        break
      case 'error':
        log('Error: ' + msg.message, 'error')
        break
    }
  }

  ws.onclose = () => {
    setStatus('disconnected')
    connectBtn.style.display = 'inline-block'
    disconnectBtn.style.display = 'none'
    tokenInput.disabled = false
    identity = null
    renderPresence([])
    log('Disconnected', 'error')
    ws = null
  }

  ws.onerror = () => {
    log('WebSocket error', 'error')
  }
}

function disconnect() {
  if (ws) { ws.close(); ws = null }
}

function fetchRecords() {
  if (!ws) return
  ws.send(JSON.stringify({ type: 'list-records' }))
}

function createRecord() {
  if (!ws) { alert('Connect first'); return }
  let content
  try { content = JSON.parse(recordContent.value) } catch { content = { body: recordContent.value } }
  ws.send(JSON.stringify({ type: 'create-record', record: content }))
}

function renderRecords(records) {
  if (!records.length) { recordList.innerHTML = '<p style="color:#666;font-size:0.82rem">No records yet</p>'; return }
  recordList.innerHTML = records.map(r => `
    <div class="record">
      <div style="font-weight:600">${r.title || r.body?.slice(0, 50) || 'Untitled'}</div>
      <div class="meta">ID: ${r.id.slice(0, 8)}... | Created: ${new Date(r.createdAt).toLocaleString()}</div>
    </div>
  `).join('')
}

function renderPresence(users) {
  if (!users.length) { presenceList.innerHTML = '<span style="color:#666;font-size:0.82rem">No users connected</span>'; return }
  presenceList.innerHTML = users.map(u => `
    <span class="user-badge ${u.role}">${u.role === 'dm' ? '⚔️' : '🎭'} ${u.username}</span>
  `).join('')
}

connectBtn.addEventListener('click', connect)
disconnectBtn.addEventListener('click', disconnect)
createRecordBtn.addEventListener('click', createRecord)

// Load token from URL hash
if (location.hash) {
  tokenInput.value = decodeURIComponent(location.hash.slice(1))
}
</script>
</body>
</html>
